data:
    dataset_type: "cached_buildingBlocks"
    # encoding_type: "cached_diffusion_cosin_angle_objfeatsnorm_lat32_wocm" #"****_no_prm"
    encoding_type: "cached_diffusion_txtBuilding_cosin_angle_wocm_prmAll" #"****_no_prm"

    # dataset_directory: "../3d_front_processed/bedrooms_objfeats_32_64"
    dataset_directory: "../BoxCenterSizeLabelNp"
    annotation_file: "../config/building_splits.csv"
    path_to_invalid_scene_ids: "../config/invalid_building.txt"
    path_to_invalid_bbox_jids: "../config/black_list_building.txt"
    augmentations: None #["fixed_rotations"]
    # filter_fn: "threed_front_bedroom" #"no_filtering"
    filter_fn: "no_filtering"

    train_stats: "dataset_stats.txt"
    # room_layout_size: "64,64"
    max_length: 128 #128
    pad_zero: false #true #false
    
    cond_path: "condition_agg"
    txt_suffix: "gpt-4o_corrected_classification.txt" #".txt"

    img_condition: false
    txt_condition: true
    cut_text: true


network:
    type: "diffusion_scene_layout_ddpm"
    # denoising network
    net_type: "dit_adaln"

    # concate squarewish layer
    point_dim: 22 #30 #62 #29 #class_dim+3+3+angle_dim
    latent_dim: 0
    room_mask_condition: false # not use room_mask 
    text_condition: True
    text_embed_dim: 512
    sample_num_points: 128 #128 # max_length 


    objectness_dim: 0
    class_dim: 14 #22 #n+1
    angle_dim: 2
    objfeat_dim: 0 #32 #64
    #'accessoryMaterial':0,'awningMaterial':1,'balconyMaterial':2,'chimneyMaterial':3,'doorMaterial':4,'floorMaterial':5,'pillarMaterial':6,'pipeMaterial':7,'railingMaterial':8,'roofMaterial':9,'stairMaterial':10,'wallMaterial':11,'windowMaterial':12
    # iou_ignore: [2,5,8,9,11] 
    loss_iou_mode: 'overlap_ratio' 
    size_half: false 


    # class condition
    learnable_embedding: false #true
    instance_condition:  false #true
    instance_emb_dim:    0 #128

    # diffusion config
    diffusion_kwargs:
        schedule_type: 'linear'
        beta_start: 0.0001
        beta_end: 0.02
        time_num: 1000 
        loss_type: 'mse'
        model_mean_type: 'v' #'x0' #'eps'
        model_var_type: 'fixedsmall'
        loss_separate: true
        # calculate iou loss
        loss_iou: true
        # train_stats_file: "../3d_front_processed/bedrooms_objfeats/dataset_stats.txt"
        train_stats_file: "../BoxCenterSizeLabelNp/dataset_stats.txt"

    net_kwargs:
        dim: 512 #encoder/decoder dim
        width: 512 #transformer width
        n_ctx: 128 #length
        time_token_cond: false #t is token or add to hidden_state
        channels: 22 #30 #62 
        objectness_dim: 0
        class_dim: 14 #22
        angle_dim: 2
        objfeat_dim: 0 #32
        context_dim: 0
        instanclass_dim: 0
        layers: 12 #12 #6 
        seperate_all: true  
        with_window: false #true #false #true
        window_size: 16
        pos_embeding_way: "learned" #"no_pos_embed" #"learned"
        size_half: false 
        gate_shifting: true

        text_condition: True
        text_dim: 512

feature_extractor:
    name: "resnet18"
    feature_size: 64
    freeze_bn: true
    input_channels: 1

training:
    splits: ["train", "val"]
    epochs: 100000
    steps_per_epoch: 500
    batch_size: 64
    save_frequency: 1000
    max_grad_norm: 10
    # optimizer
    optimizer: Adam
    weight_decay: 0.0
    # schedule
    schedule: 'step'
    lr: 0.0002
    lr_step: 10000
    lr_decay: 0.5

validation:
    splits: ["test"]
    frequency: 500
    batch_size: 1
    gen_traj: false
    num_step: 100
    gen_gt: false
    gen_prob_map: false

logger:
    type: "wandb"
    project: "BuildingBlock_building"